<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <section class="container">
        <h1>Calculadora incrivel do balacobaco v2.1</h1>
       <form class="form">
          <button id="num0" data-valor="0" class="botao">0</button>
          <button id="num1" data-valor="1" class="botao">1</button>
          <button id="num2" data-valor="2" class="botao">2</button>
          <button id="num3" data-valor="3" class="botao">3</button>
          <button id="num4" data-valor="4" class="botao">4</button>
          <button id="num5" data-valor="5" class="botao">5</button>
          <button id="num6" data-valor="6" class="botao">6</button>
          <button id="num7" data-valor="7" class="botao">7</button>
          <button id="num8" data-valor="8" class="botao">8</button>
          <button id="num9" data-valor="9" class="botao">9</button>
          <button id="soma" data-valor="+" class="botao">+</button>
          <button id="soma" data-valor="-" class="botao">-</button>
          <button id="multiplicacao" data-valor="multiplicacao" class="botao">X</button>
          <button id="divisao" data-valor="divisao" class="botao">÷</button>
           <button id="limpar" data-valor="limpar" class="botao">C</button>
          <button id="igual" data-valor="=" class="botao">=</button>
          <button id="apagar_ultimo" data-valor="apagar_ultimo" class="botao">apagar ultimo digito</button>
          <div id="resultado"></div>
</form>
    </section>
    <script src="./assets/script/main.js"></script>
</body>

</html>
