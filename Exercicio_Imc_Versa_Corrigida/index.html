<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <section class="container">
        <h1>Tabela IMC</h1>
        <p> <strong> IMC/resultado </strong> <br>
            Menor do que 18,5: Abaixo do peso <br>
            Entre 18,5 e 24,9: peso normal <br>
            Entre 25 e 29,9: sobrepeso<br>
            Entre 30 e 34: obesidade grau 1 <br>
            Entre 35 e 39,9:obesidade grau 2 <br>
            Maior que 40: obesidade grau 3
        </p>
        <h1>Calcule seu imc</h1>
        <form action="" class="form">
            <label for="input-teste-1">Insira seu peso:</label>
            <input type="text" id="peso">

            <label for="input-teste-2">insira sua altura:</label>
            <input type="text" id="altura">

            <p class="resultado"></p>
            <button>enviar</button>

        </form>
    </section>
    <script src="./assets/script/main.js"></script>
</body>

</html>
