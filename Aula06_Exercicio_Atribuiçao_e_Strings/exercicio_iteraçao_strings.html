<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
   const nome = prompt("digite seu nome completo chefe");

   document.body.innerHTML = `O seu nome é <strong>${nome}<strong> <br />`;
   document.body.innerHTML +=  `O seu nome tem <strong>${nome.length}<strong> letras <br />`;
   document.body.innerHTML += `A segunda letra do seu nome é <strong>${nome[1]}<strong> <br />`;
   document.body.innerHTML += `Qual o primeira ídice da letra "A" no seu nome, é o indice <strong>${nome.indexOf("a") }<strong><br />`
   document.body.innerHTML += `Qual o ultimo índice da lestra "A" no seu nome, é o indice <strong> ${nome.lastIndexOf("a")}<strong><br />`
   document.body.innerHTML += `As ultimas três letras do seu nome são:<strong> ${nome.slice(-3)}<strong> <br />`
   document.body.innerHTML += `As palavras do seu nome são:<strong> ${nome.split(" ")}<strong><br/ >`
   document.body.innerHTML += `Seu nome com as letras maiúculas:<strong> ${nome.toUpperCase()}<strong><br/ >`
   document.body.innerHTML += `Seu nome com as letras minúsculas:<strong> ${nome.toLowerCase()}<strong> <br/ >`


    </script>
</body>
</html>
